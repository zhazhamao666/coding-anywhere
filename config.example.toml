[server]
host = "127.0.0.1"
port = 3000

[storage]
sqlitePath = "data/bridge.db"
logDir = "logs"

[codex]
command = "codex"
defaultModel = "gpt-5.4"
defaultReasoningEffort = "high"
defaultSpeed = "standard"
modelOptions = ["gpt-5.4", "gpt-5.2-codex", "gpt-5.1-codex-max", "gpt-5.4-mini", "gpt-5.3-codex", "gpt-5.3-codex-spark", "gpt-5.2", "gpt-5.1-codex-mini"]
reasoningEffortOptions = ["low", "medium", "high", "xhigh"]
speedOptions = ["standard", "fast"]

[feishu]
appId = "cli_xxx"
appSecret = "replace-me"
websocketUrl = "wss://open.feishu.cn/open-apis/bot/v2/hub"
apiBaseUrl = "https://open.feishu.cn/open-apis"
allowlist = ["ou_xxx"]
requireGroupMention = false
encryptKey = ""
reconnectCount = -1
reconnectIntervalSeconds = 120
reconnectNonceSeconds = 30

[root]
id = "main"
name = "Main Root"
cwd = "D:/path/to/repos"
repoRoot = "D:/path/to/repos"
branchPolicy = "reuse"
permissionMode = "workspace-write"
envAllowlist = ["PATH", "HOME"]
idleTtlHours = 24
